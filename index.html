<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <!-- Linking the CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- AUTHENTICATION SCREEN (Login & Sign Up) -->
    <div id="authContainer" class="auth-wrapper">
        <div class="auth-box">
            <h1 id="authTitle" class="brand-title">Login</h1>
            
            <!-- Login Form -->
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="Username">
                <input type="password" id="loginPassword" placeholder="Password">
                <button class="btn btn-primary" onclick="login()">Login</button>
                <p class="switch-text">Don't have an account? <span class="link" onclick="toggleAuth()">Sign up here</span></p>
            </div>

            <!-- Sign Up Form (Hidden initially) -->
            <div id="signupForm" style="display: none;">
                <input type="text" id="signupUsername" placeholder="New Username">
                <input type="password" id="signupPassword" placeholder="New Password">
                <button class="btn btn-primary" onclick="signup()">Sign Up</button>
                <p class="switch-text">Already have an account? <span class="link" onclick="toggleAuth()">Login here</span></p>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCREEN (Hidden initially) -->
    <div id="appContainer" class="app-wrapper" style="display: none;">
        <div class="container">
            
            <!-- Top Header Navbar -->
            <div class="header">
                <h1 class="brand-title">Welcome, <span id="userDisplay">User</span>!</h1>
                <button class="btn btn-danger" onclick="logout()">Logout</button>
            </div>

            <!-- Main Dashboard Layout -->
            <div class="dashboard">
                
                <!-- Left Column for Inputs -->
                <div class="left-panel">
                    <div class="card">
                        <h2>Add Account</h2>
                        <input type="text" id="accountName" placeholder="Account Name (e.g., GPay)">
                        <input type="number" id="accountBalance" placeholder="Starting Balance (₹)">
                        <button class="btn btn-success" onclick="addAccount()">Add Account</button>
                    </div>

                    <div class="card">
                        <h2>Add Transaction</h2>
                        <input type="text" id="transText" placeholder="Description (e.g., Groceries)">
                        <input type="number" id="transAmount" placeholder="Amount (+ income, - expense)">
                        <select id="transAccount">
                            <!-- Options will be added here by JavaScript -->
                            <option value="" disabled selected>Select Account</option>
                        </select>
                        <button class="btn btn-success" onclick="addTransaction()">Add Transaction</button>
                    </div>
                </div>

                <!-- Right Column for Outputs/Lists -->
                <div class="right-panel">
                    <div class="card">
                        <h2>Your Accounts</h2>
                        <ul id="accountsList">
                            <!-- Accounts will appear here -->
                        </ul>
                    </div>

                    <div class="card">
                        <h2>Transaction History</h2>
                        <ul id="transactionsList">
                            <!-- Transactions will appear here -->
                        </ul>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Linking the JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
